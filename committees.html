<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة اللجان - ITWS Union</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/themes.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* الشريط الجانبي */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--bg-sidebar);
            box-shadow: -5px 0 20px var(--shadow-color);
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px 20px;
            background: var(--bg-header);
            color: white;
            text-align: center;
        }

        .sidebar-header .user-avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary-color);
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .sidebar-menu {
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .menu-item i {
            width: 25px;
            margin-left: 10px;
        }

        .menu-item:hover, .menu-item.active {
            background: var(--gradient-primary);
            color: white;
        }

        .menu-item .badge {
            background: var(--danger-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: auto;
        }

        .ai-menu-item {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white !important;
            margin-top: 20px;
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            padding: 20px;
        }

        .top-bar {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .page-title h2 {
            color: var(--text-primary);
            font-size: 24px;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        /* تبويبات اللجان */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow-color);
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .tab i {
            margin-left: 8px;
        }

        .tab:hover {
            background: var(--bg-primary);
        }

        .tab.active {
            background: var(--gradient-primary);
            color: white;
        }

        /* شبكة اللجان */
        .committees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .committee-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: all 0.3s;
            border-right: 4px solid var(--primary-color);
            border: 1px solid var(--border-light);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .committee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-hover);
        }

        .committee-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .committee-header h3 {
            color: var(--text-primary);
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .committee-header h3 i {
            color: var(--primary-color);
        }

        .committee-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .committee-description {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
        }

        .committee-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 10px;
            background: var(--bg-primary);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat .number {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat .label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .committee-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .committee-actions button {
            flex: 1;
            min-width: 60px;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .btn-view {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit {
            background: #fff3e0;
            color: #f57c00;
        }

        .btn-manage {
            background: #e8f5e9;
            color: #388e3c;
        }

        .btn-report {
            background: #f3e5f5;
            color: #8e24aa;
        }

        .btn-send {
            background: #e1f5fe;
            color: #0288d1;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        /* نافذة منبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-light);
        }

        .modal-header h3 {
            color: var(--text-primary);
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        /* أيقونة AI */
        .ai-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,107,107,0.3);
            z-index: 999;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .ai-toggle:hover {
            transform: scale(1.1);
        }

        /* رسائل النظام */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message-box.success {
            background: var(--success-color);
        }

        .message-box.error {
            background: var(--danger-color);
        }

        .message-box.info {
            background: var(--info-color);
        }

        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* استجابة للجوال */
        @media (max-width: 768px) {
            .sidebar {
                right: -280px;
            }
            .sidebar.active {
                right: 0;
            }
            .main-content {
                margin-right: 0;
            }
            .committees-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط الجانبي -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" id="userInfo">
            <!-- يتم تعبئتها ديناميكياً -->
        </div>

        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-home"></i>
                الرئيسية
            </a>
            <a href="committees.html" class="menu-item active">
                <i class="fas fa-users"></i>
                اللجان
                <span class="badge" id="committeesCount">0</span>
            </a>
            <a href="branches.html" class="menu-item">
                <i class="fas fa-building"></i>
                الفروع
                <span class="badge" id="branchesCount">0</span>
            </a>
            <a href="members.html" class="menu-item">
                <i class="fas fa-user-tie"></i>
                الأعضاء
                <span class="badge" id="membersCount">0</span>
            </a>
            <a href="requests.html" class="menu-item">
                <i class="fas fa-clipboard-list"></i>
                طلبات التسجيل
                <span class="badge" id="pendingRequests">0</span>
            </a>
            <a href="tracking.html" class="menu-item">
                <i class="fas fa-exchange-alt"></i>
                نظام التتبع
                <span class="badge" id="trackingCount">0</span>
            </a>
            <a href="messages.html" class="menu-item">
                <i class="fas fa-envelope"></i>
                الرسائل
                <span class="badge" id="messagesCount">0</span>
            </a>
            <a href="evaluations.html" class="menu-item">
                <i class="fas fa-star"></i>
                التقييمات
            </a>
            <a href="attendance.html" class="menu-item">
                <i class="fas fa-clock"></i>
                الحضور
            </a>
            <a href="profile.html" class="menu-item">
                <i class="fas fa-user-circle"></i>
                الملف الشخصي
            </a>
            
            <div style="height: 20px;"></div>
            
            <a href="#" class="menu-item ai-menu-item" onclick="toggleAIChat()">
                <i class="fas fa-robot"></i>
                ITWS AI مساعد
            </a>
            
            <div style="height: 20px;"></div>
            
            <a href="#" class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                تسجيل الخروج
            </a>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <div class="page-title">
                <h2><i class="fas fa-users"></i> إدارة اللجان</h2>
                <p id="currentDateTime"></p>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="showCreateCommitteeModal()">
                    <i class="fas fa-plus"></i>
                    إنشاء لجنة
                </button>
                <button class="btn-secondary" onclick="showSendRequestModal()">
                    <i class="fas fa-paper-plane"></i>
                    طلب إلى فرع
                </button>
            </div>
        </div>

        <!-- تبويبات اللجان -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('all')">
                <i class="fas fa-list"></i>
                جميع اللجان
            </div>
            <div class="tab" onclick="switchTab('my')">
                <i class="fas fa-user-tie"></i>
                لجنتي
            </div>
            <div class="tab" onclick="switchTab('requests')">
                <i class="fas fa-inbox"></i>
                الطلبات الواردة
                <span class="badge" id="requestsBadge">0</span>
            </div>
            <div class="tab" onclick="switchTab('reports')">
                <i class="fas fa-file-alt"></i>
                التقارير
            </div>
        </div>

        <!-- محتوى جميع اللجان -->
        <div id="allCommitteesTab" class="tab-content" style="display: block;">
            <div class="committees-grid" id="committeesGrid">
                <!-- يتم تعبئتها ديناميكياً -->
                <div class="loading-spinner" style="display: flex; position: relative; background: transparent;">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- محتوى لجنتي -->
        <div id="myCommitteesTab" class="tab-content" style="display: none;">
            <div class="committees-grid" id="myCommitteesGrid"></div>
        </div>

        <!-- محتوى الطلبات -->
        <div id="requestsTab" class="tab-content" style="display: none;">
            <div class="requests-list" id="requestsList"></div>
        </div>

        <!-- محتوى التقارير -->
        <div id="reportsTab" class="tab-content" style="display: none;">
            <div class="reports-section" id="reportsSection"></div>
        </div>
    </div>

    <!-- نافذة إنشاء لجنة -->
    <div class="modal" id="createCommitteeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> إنشاء لجنة جديدة</h3>
                <button class="close-modal" onclick="closeCreateCommitteeModal()">&times;</button>
            </div>
            <form id="createCommitteeForm">
                <div class="form-group">
                    <label>اسم اللجنة</label>
                    <input type="text" id="committeeName" required placeholder="أدخل اسم اللجنة">
                </div>

                <div class="form-group">
                    <label>وصف اللجنة</label>
                    <textarea id="committeeDescription" rows="3" required placeholder="أدخل وصف اللجنة ومهامها"></textarea>
                </div>

                <div class="form-group">
                    <label>مدير اللجنة</label>
                    <select id="committeeManager" required>
                        <option value="">اختر مدير اللجنة</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>اللجنة الأم (اختياري)</label>
                    <select id="parentCommittee">
                        <option value="">بدون</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i>
                    إنشاء اللجنة
                </button>
            </form>
        </div>
    </div>

    <!-- نافذة إرسال طلب إلى فرع -->
    <div class="modal" id="sendRequestModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> إرسال طلب إلى فرع</h3>
                <button class="close-modal" onclick="closeSendRequestModal()">&times;</button>
            </div>
            <form id="sendRequestForm">
                <div class="form-group">
                    <label>الفرع المستلم</label>
                    <select id="targetBranch" required>
                        <option value="">اختر الفرع</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>نوع الطلب</label>
                    <select id="requestType" required>
                        <option value="request">طلب</option>
                        <option value="report">تقرير</option>
                        <option value="complaint">شكوى</option>
                        <option value="suggestion">اقتراح</option>
                        <option value="decision">قرار</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>عنوان الطلب</label>
                    <input type="text" id="requestTitle" required placeholder="أدخل عنوان الطلب">
                </div>

                <div class="form-group">
                    <label>محتوى الطلب</label>
                    <textarea id="requestContent" rows="5" required placeholder="أدخل محتوى الطلب..."></textarea>
                </div>

                <div class="form-group">
                    <label>الأولوية</label>
                    <select id="requestPriority">
                        <option value="normal">عادية</option>
                        <option value="high">عالية</option>
                        <option value="urgent">عاجلة</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>المهلة (اختياري)</label>
                    <input type="date" id="requestDeadline">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-paper-plane"></i>
                    إرسال الطلب
                </button>
            </form>
        </div>
    </div>

    <!-- نافذة تفاصيل اللجنة -->
    <div class="modal" id="committeeDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> تفاصيل اللجنة</h3>
                <button class="close-modal" onclick="closeCommitteeDetailsModal()">&times;</button>
            </div>
            <div id="committeeDetailsContent"></div>
        </div>
    </div>

    <!-- أيقونة AI -->
    <div class="ai-toggle" onclick="toggleAIChat()">
        <i class="fas fa-robot"></i>
    </div>

    <!-- رسائل النظام -->
    <div id="messageBox" class="message-box"></div>

    <!-- شاشة التحميل -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import NotificationSystem from './assets/js/notifications.js';
        import ThemeManager from './assets/js/theme-manager.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCaPhRG_1c7Rsu5Ss_MUNqsE18Ky_nyEAA",
            authDomain: "itws-system.firebaseapp.com",
            databaseURL: "https://itws-system-default-rtdb.firebaseio.com",
            projectId: "itws-system",
            storageBucket: "itws-system.firebasestorage.app",
            messagingSenderId: "770452248691",
            appId: "1:770452248691:web:0e94e65e01298b398bb206"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // التحقق من تسجيل الدخول
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // تهيئة الأنظمة
        const notificationSystem = new NotificationSystem(currentUser);
        const themeManager = new ThemeManager(currentUser);

        // متغيرات عامة
        let committees = {};
        let branches = {};
        let users = {};

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('ar-EG', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        // عرض معلومات المستخدم
        function displayUserInfo() {
            const userInfo = document.getElementById('userInfo');
            let title = currentUser.role === 'president' ? 'النقيب العام' :
                       currentUser.role === 'vice_president' ? 'النائب الأول' :
                       currentUser.role === 'committee_manager' ? 'مدير لجنة' : 'عضو';

            userInfo.innerHTML = `
                <div class="user-avatar" onclick="window.location.href='profile.html'">
                    ${currentUser.profileImage ? 
                        `<img src="${currentUser.profileImage}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">` : 
                        '<i class="fas fa-user-circle"></i>'}
                </div>
                <h3>${currentUser.fullName || currentUser.username}</h3>
                <p>${title}</p>
                <div class="online-badge">
                    <i class="fas fa-circle"></i> متصل الآن
                </div>
            `;
        }
        displayUserInfo();

        // دوال مساعدة
        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message-box ${type}`;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
        }

        // تحميل البيانات
        async function loadData() {
            showLoading(true);
            try {
                const [committeesSnap, branchesSnap, usersSnap] = await Promise.all([
                    get(ref(database, 'committees')),
                    get(ref(database, 'branches')),
                    get(ref(database, 'users'))
                ]);

                if (committeesSnap.exists()) {
                    committees = committeesSnap.val();
                    document.getElementById('committeesCount').textContent = Object.keys(committees).length;
                }

                if (branchesSnap.exists()) {
                    branches = branchesSnap.val();
                    document.getElementById('branchesCount').textContent = Object.keys(branches).length;
                }

                if (usersSnap.exists()) {
                    users = usersSnap.val();
                    document.getElementById('membersCount').textContent = Object.keys(users).length;
                }

                displayCommittees();
                populateSelects();

            } catch (error) {
                console.error('Error loading data:', error);
                showMessage('حدث خطأ في تحميل البيانات', 'error');
            } finally {
                showLoading(false);
            }
        }

        // عرض اللجان
        function displayCommittees() {
            const grid = document.getElementById('committeesGrid');
            
            if (!committees || Object.keys(committees).length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">لا توجد لجان</p>';
                return;
            }

            grid.innerHTML = Object.entries(committees).map(([id, committee]) => {
                const membersCount = committee.members ? Object.keys(committee.members).length : 0;
                const reportsCount = committee.reports ? Object.keys(committee.reports).length : 0;

                return `
                    <div class="committee-card">
                        <div class="committee-header">
                            <h3><i class="fas fa-users"></i> ${committee.name}</h3>
                            <span class="committee-status status-${committee.status || 'active'}">
                                ${committee.status === 'active' ? 'نشط' : 'غير نشط'}
                            </span>
                        </div>
                        <div class="committee-description">${committee.description || 'لا يوجد وصف'}</div>
                        <div class="committee-stats">
                            <div class="stat">
                                <span class="number">${membersCount}</span>
                                <span class="label">أعضاء</span>
                            </div>
                            <div class="stat">
                                <span class="number">${reportsCount}</span>
                                <span class="label">تقارير</span>
                            </div>
                        </div>
                        <div class="committee-actions">
                            <button class="btn-view" onclick="viewCommittee('${id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            ${(currentUser.role === 'president' || currentUser.role === 'vice_president' || 
                               (currentUser.role === 'committee_manager' && committee.managerId === currentUser.userId)) ? `
                                <button class="btn-edit" onclick="editCommittee('${id}')">
                                    <i class="fas fa-edit"></i>
                                </button>
                            ` : ''}
                            <button class="btn-manage" onclick="manageCommittee('${id}')">
                                <i class="fas fa-tasks"></i>
                            </button>
                            <button class="btn-send" onclick="showSendToBranch('${id}')">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                            <button class="btn-report" onclick="generateCommitteeReport('${id}')">
                                <i class="fas fa-file-alt"></i>
                            </button>
                            ${currentUser.role === 'president' ? `
                                <button class="btn-delete" onclick="deleteCommittee('${id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // تعبئة الخيارات
        function populateSelects() {
            // تعبئة خيارات المديرين
            const managerSelect = document.getElementById('committeeManager');
            if (managerSelect) {
                managerSelect.innerHTML = '<option value="">اختر مدير اللجنة</option>';
                Object.entries(users).forEach(([id, user]) => {
                    if (user.role !== 'president' && user.role !== 'vice_president') {
                        managerSelect.innerHTML += `<option value="${id}">${user.fullName || user.username}</option>`;
                    }
                });
            }

            // تعبئة خيارات الفروع
            const branchSelect = document.getElementById('targetBranch');
            if (branchSelect) {
                branchSelect.innerHTML = '<option value="">اختر الفرع</option>';
                Object.entries(branches).forEach(([id, branch]) => {
                    branchSelect.innerHTML += `<option value="${id}">${branch.name} - ${branch.governorate}</option>`;
                });
            }

            // تعبئة خيارات اللجان الأم
            const parentSelect = document.getElementById('parentCommittee');
            if (parentSelect) {
                parentSelect.innerHTML = '<option value="">بدون</option>';
                Object.entries(committees).forEach(([id, committee]) => {
                    parentSelect.innerHTML += `<option value="${id}">${committee.name}</option>`;
                });
            }
        }

        // إنشاء لجنة جديدة
        window.showCreateCommitteeModal = function() {
            if (currentUser.role !== 'president' && currentUser.role !== 'vice_president') {
                showMessage('ليس لديك صلاحية إنشاء لجان', 'error');
                return;
            }
            document.getElementById('createCommitteeModal').classList.add('active');
        };

        window.closeCreateCommitteeModal = function() {
            document.getElementById('createCommitteeModal').classList.remove('active');
        };

        document.getElementById('createCommitteeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (currentUser.role !== 'president' && currentUser.role !== 'vice_president') {
                showMessage('ليس لديك صلاحية إنشاء لجان', 'error');
                return;
            }

            showLoading(true);

            try {
                const committeeData = {
                    name: document.getElementById('committeeName').value,
                    description: document.getElementById('committeeDescription').value,
                    managerId: document.getElementById('committeeManager').value,
                    parentCommittee: document.getElementById('parentCommittee').value || null,
                    members: {},
                    reports: {},
                    subCommittees: {},
                    createdAt: new Date().toISOString(),
                    createdBy: currentUser.userId,
                    status: 'active',
                    trackingNumber: await generateTrackingNumber('COM')
                };

                const committeesRef = ref(database, 'committees');
                const newCommitteeRef = push(communitiesRef);
                await set(newCommitteeRef, committeeData);

                // إرسال إشعار للأعضاء
                await notificationSystem.broadcastNotification({
                    type: 'committee',
                    title: 'لجنة جديدة',
                    message: `تم إنشاء لجنة ${committeeData.name}`,
                    link: 'committees.html',
                    priority: 'normal'
                }, Object.keys(users));

                showMessage('تم إنشاء اللجنة بنجاح', 'success');
                closeCreateCommitteeModal();
                loadData();

            } catch (error) {
                console.error('Error creating committee:', error);
                showMessage('حدث خطأ في إنشاء اللجنة', 'error');
            } finally {
                showLoading(false);
            }
        });

        // عرض تفاصيل اللجنة
        window.viewCommittee = async function(committeeId) {
            const committee = committees[committeeId];
            if (!committee) return;

            const membersList = committee.members ? Object.entries(committee.members).map(([id, member]) => `
                <div class="member-item">
                    <div class="member-avatar">${(users[id]?.fullName || '?').charAt(0)}</div>
                    <div class="member-info">
                        <h4>${users[id]?.fullName || 'عضو'}</h4>
                        <p>${member.role || 'عضو'}</p>
                    </div>
                </div>
            `).join('') : '<p>لا يوجد أعضاء</p>';

            const content = document.getElementById('committeeDetailsContent');
            content.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4>${committee.name}</h4>
                    <p>${committee.description}</p>
                    <p><strong>رقم التتبع:</strong> ${committee.trackingNumber || 'غير محدد'}</p>
                </div>
                <h5>الأعضاء (${Object.keys(committee.members || {}).length})</h5>
                <div class="members-list">${membersList}</div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-primary" onclick="manageCommittee('${committeeId}')">
                        <i class="fas fa-tasks"></i> إدارة
                    </button>
                    <button class="btn-secondary" onclick="showSendToBranch('${committeeId}')">
                        <i class="fas fa-paper-plane"></i> إرسال طلب
                    </button>
                </div>
            `;

            document.getElementById('committeeDetailsModal').classList.add('active');
        };

        window.closeCommitteeDetailsModal = function() {
            document.getElementById('committeeDetailsModal').classList.remove('active');
        };

        // إدارة اللجنة
        window.manageCommittee = function(committeeId) {
            sessionStorage.setItem('currentCommittee', committeeId);
            window.location.href = `committee-management.html?id=${committeeId}`;
        };

        // تعديل اللجنة
        window.editCommittee = function(committeeId) {
            sessionStorage.setItem('editCommittee', committeeId);
            window.location.href = `edit-committee.html?id=${committeeId}`;
        };

        // حذف اللجنة
        window.deleteCommittee = async function(committeeId) {
            if (currentUser.role !== 'president') {
                showMessage('ليس لديك صلاحية حذف اللجان', 'error');
                return;
            }

            if (!confirm('هل أنت متأكد من حذف هذه اللجنة؟')) return;

            showLoading(true);
            try {
                await remove(ref(database, `committees/${committeeId}`));
                showMessage('تم حذف اللجنة بنجاح', 'success');
                loadData();
            } catch (error) {
                console.error('Error deleting committee:', error);
                showMessage('حدث خطأ في حذف اللجنة', 'error');
            } finally {
                showLoading(false);
            }
        };

        // إرسال طلب إلى فرع
        window.showSendToBranch = function(committeeId) {
            sessionStorage.setItem('fromCommitteeId', committeeId);
            document.getElementById('sendRequestModal').classList.add('active');
        };

        window.closeSendRequestModal = function() {
            document.getElementById('sendRequestModal').classList.remove('active');
        };

        document.getElementById('sendRequestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            showLoading(true);

            try {
                const fromCommitteeId = sessionStorage.getItem('fromCommitteeId');
                const committee = committees[fromCommitteeId];
                const branchId = document.getElementById('targetBranch').value;
                const branch = branches[branchId];

                const trackingNumber = await generateTrackingNumber('REQ');
                
                const requestData = {
                    trackingNumber,
                    type: document.getElementById('requestType').value,
                    fromType: 'committee',
                    fromId: fromCommitteeId,
                    fromName: committee.name,
                    toType: 'branch',
                    toId: branchId,
                    toName: branch.name,
                    title: document.getElementById('requestTitle').value,
                    content: document.getElementById('requestContent').value,
                    priority: document.getElementById('requestPriority').value,
                    deadline: document.getElementById('requestDeadline').value || null,
                    status: 'pending',
                    history: [{
                        status: 'sent',
                        timestamp: new Date().toISOString(),
                        by: currentUser.userId,
                        note: 'تم إرسال الطلب'
                    }],
                    createdAt: new Date().toISOString(),
                    createdBy: currentUser.userId
                };

                const trackingRef = ref(database, 'tracking');
                await push(trackingRef, requestData);

                // إشعار مدير الفرع
                if (branch.managerId) {
                    await notificationSystem.createNotification({
                        userId: branch.managerId,
                        type: 'request',
                        title: 'طلب جديد من لجنة',
                        message: `لديك طلب جديد من ${committee.name}`,
                        link: 'tracking.html',
                        priority: requestData.priority,
                        metadata: { trackingNumber }
                    });
                }

                showMessage('تم إرسال الطلب بنجاح', 'success');
                closeSendRequestModal();

            } catch (error) {
                console.error('Error sending request:', error);
                showMessage('حدث خطأ في الإرسال', 'error');
            } finally {
                showLoading(false);
            }
        });

        // توليد رقم تتبع
        async function generateTrackingNumber(prefix) {
            const year = new Date().getFullYear();
            const counterRef = ref(database, `counters/${prefix}_${year}`);
            const snapshot = await get(counterRef);
            const currentCount = snapshot.exists() ? snapshot.val() : 0;
            const newCount = currentCount + 1;
            await set(counterRef, newCount);
            
            const paddedNumber = newCount.toString().padStart(4, '0');
            return `${prefix}-${paddedNumber}-${year}`;
        }

        // توليد تقرير لجنة
        window.generateCommitteeReport = async function(committeeId) {
            const committee = committees[committeeId];
            if (!committee) return;

            const report = {
                committeeName: committee.name,
                membersCount: Object.keys(committee.members || {}).length,
                reportsCount: Object.keys(committee.reports || {}).length,
                createdAt: new Date(committee.createdAt).toLocaleDateString('ar-EG'),
                status: committee.status,
                trackingNumber: committee.trackingNumber,
                generatedAt: new Date().toLocaleString('ar-EG')
            };

            // فتح نافذة الطباعة
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>تقرير ${committee.name}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Cairo', sans-serif; padding: 20px; }
                        .report-header { text-align: center; margin-bottom: 30px; }
                        .report-title { color: #667eea; }
                        .info-table { width: 100%; border-collapse: collapse; }
                        .info-table td { padding: 10px; border: 1px solid #ddd; }
                    </style>
                </head>
                <body>
                    <div class="report-header">
                        <h1 class="report-title">نقابة تكنولوجيا المعلومات والبرمجيات</h1>
                        <h2>تقرير اللجنة: ${committee.name}</h2>
                    </div>
                    <table class="info-table">
                        <tr><td>رقم التتبع</td><td>${report.trackingNumber || 'غير محدد'}</td></tr>
                        <tr><td>عدد الأعضاء</td><td>${report.membersCount}</td></tr>
                        <tr><td>عدد التقارير</td><td>${report.reportsCount}</td></tr>
                        <tr><td>تاريخ الإنشاء</td><td>${report.createdAt}</td></tr>
                        <tr><td>الحالة</td><td>${report.status === 'active' ? 'نشط' : 'غير نشط'}</td></tr>
                        <tr><td>تاريخ التقرير</td><td>${report.generatedAt}</td></tr>
                    </table>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        };

        // تبديل التبويبات
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById(`${tab}CommitteesTab`).style.display = 'block';
        };

        // دوال AI
        window.toggleAIChat = function() {
            showMessage('🤖 ITWS AI: كيف يمكنني مساعدتك في إدارة اللجان؟', 'info');
        };

        // تسجيل الخروج
        window.logout = async function() {
            await update(ref(database, `users/${currentUser.userId}`), {
                online: false,
                lastSeen: new Date().toISOString()
            });
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };

        // تحديث حالة المتصل
        async function updateOnlineStatus(status) {
            await update(ref(database, `users/${currentUser.userId}`), {
                online: status,
                lastSeen: new Date().toISOString()
            });
        }

        window.addEventListener('load', () => {
            updateOnlineStatus(true);
            loadData();
        });

        window.addEventListener('beforeunload', () => {
            updateOnlineStatus(false);
        });

        // تحديث مباشر
        onValue(ref(database, 'committees'), () => loadData());

    </script>
</body>
</html>
