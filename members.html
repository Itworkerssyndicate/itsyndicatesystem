<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأعضاء - ITWS Union</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/themes.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* الشريط الجانبي */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--bg-sidebar);
            box-shadow: -5px 0 20px var(--shadow-color);
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px 20px;
            background: var(--bg-header);
            color: white;
            text-align: center;
        }

        .sidebar-header .user-avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary-color);
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .sidebar-menu {
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .menu-item i {
            width: 25px;
            margin-left: 10px;
        }

        .menu-item:hover, .menu-item.active {
            background: var(--gradient-primary);
            color: white;
        }

        .menu-item .badge {
            background: var(--danger-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: auto;
        }

        .ai-menu-item {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white !important;
            margin-top: 20px;
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            padding: 20px;
        }

        .top-bar {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .page-title h2 {
            color: var(--text-primary);
            font-size: 24px;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        /* قسم البحث والتصفية */
        .search-section {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .search-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .filter-group input, .filter-group select {
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* شبكة الأعضاء */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .member-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: all 0.3s;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-hover);
        }

        .member-status {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
            animation: pulse 2s infinite;
        }

        .status-offline {
            background: #9e9e9e;
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
            overflow: hidden;
            border: 3px solid var(--primary-color);
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-info {
            text-align: center;
            margin-bottom: 15px;
        }

        .member-info h3 {
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 5px;
        }

        .member-info .role {
            color: var(--primary-color);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .member-info .title {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .member-details {
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-item i {
            width: 20px;
            color: var(--primary-color);
        }

        .detail-item .label {
            color: var(--text-secondary);
            min-width: 70px;
        }

        .detail-item .value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .appointment-doc {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            padding: 8px;
            background: var(--bg-card);
            border-radius: 5px;
        }

        .appointment-doc i {
            color: var(--primary-color);
        }

        .appointment-doc a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 12px;
        }

        .appointment-doc a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .member-actions {
            display: flex;
            gap: 10px;
        }

        .member-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .btn-view {
            background: #e3f2fd;
            color: #1976d2;
        }

        .btn-edit {
            background: #fff3e0;
            color: #f57c00;
        }

        .btn-message {
            background: #e8f5e9;
            color: #388e3c;
        }

        .btn-evaluate {
            background: #f3e5f5;
            color: #8e24aa;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        /* ترقيم الصفحات */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 8px 15px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button:hover {
            background: var(--primary-color);
            color: white;
        }

        .pagination button.active {
            background: var(--primary-color);
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* نافذة منبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-light);
        }

        .modal-header h3 {
            color: var(--text-primary);
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-primary);
            border: 2px dashed var(--primary-color);
            border-radius: 10px;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-label:hover {
            background: var(--primary-color);
            color: white;
        }

        .permissions-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .permission-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px;
            background: var(--bg-primary);
            border-radius: 5px;
        }

        /* ملف العضو */
        .member-file {
            margin-top: 20px;
        }

        .file-section {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 10px;
        }

        .file-section h4 {
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .file-section h4 i {
            color: var(--primary-color);
        }

        .file-row {
            display: flex;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--bg-card);
            border-radius: 5px;
        }

        .file-label {
            min-width: 120px;
            color: var(--text-secondary);
        }

        .file-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .document-link {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: var(--bg-card);
            border-radius: 5px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .document-link:hover {
            background: var(--primary-color);
            color: white;
        }

        /* أيقونة AI */
        .ai-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,107,107,0.3);
            z-index: 999;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .ai-toggle:hover {
            transform: scale(1.1);
        }

        /* رسائل النظام */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message-box.success {
            background: var(--success-color);
        }

        .message-box.error {
            background: var(--danger-color);
        }

        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-spinner p {
            color: white;
            font-size: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* استجابة للجوال */
        @media (max-width: 768px) {
            .sidebar {
                right: -280px;
            }
            .sidebar.active {
                right: 0;
            }
            .main-content {
                margin-right: 0;
            }
            .search-filters {
                grid-template-columns: 1fr;
            }
            .members-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط الجانبي -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" id="userInfo">
            <!-- يتم تعبئتها ديناميكياً -->
        </div>

        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-home"></i>
                الرئيسية
            </a>
            <a href="committees.html" class="menu-item">
                <i class="fas fa-users"></i>
                اللجان
                <span class="badge" id="committeesCount">0</span>
            </a>
            <a href="branches.html" class="menu-item">
                <i class="fas fa-building"></i>
                الفروع
                <span class="badge" id="branchesCount">0</span>
            </a>
            <a href="members.html" class="menu-item active">
                <i class="fas fa-user-tie"></i>
                الأعضاء
                <span class="badge" id="membersCount">0</span>
            </a>
            <a href="requests.html" class="menu-item">
                <i class="fas fa-clipboard-list"></i>
                طلبات التسجيل
                <span class="badge" id="pendingRequests">0</span>
            </a>
            <a href="tracking.html" class="menu-item">
                <i class="fas fa-exchange-alt"></i>
                نظام التتبع
                <span class="badge" id="trackingCount">0</span>
            </a>
            <a href="messages.html" class="menu-item">
                <i class="fas fa-envelope"></i>
                الرسائل
                <span class="badge" id="messagesCount">0</span>
            </a>
            <a href="evaluations.html" class="menu-item">
                <i class="fas fa-star"></i>
                التقييمات
            </a>
            <a href="attendance.html" class="menu-item">
                <i class="fas fa-clock"></i>
                الحضور
            </a>
            <a href="profile.html" class="menu-item">
                <i class="fas fa-user-circle"></i>
                الملف الشخصي
            </a>
            
            <div style="height: 20px;"></div>
            
            <a href="#" class="menu-item ai-menu-item" onclick="toggleAIChat()">
                <i class="fas fa-robot"></i>
                ITWS AI مساعد
            </a>
            
            <div style="height: 20px;"></div>
            
            <a href="#" class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                تسجيل الخروج
            </a>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <div class="page-title">
                <h2><i class="fas fa-user-tie"></i> إدارة الأعضاء</h2>
                <p id="currentDateTime"></p>
            </div>
            <div class="action-buttons">
                <button class="btn-primary" onclick="showAddMemberModal()">
                    <i class="fas fa-user-plus"></i>
                    إضافة عضو
                </button>
                <button class="btn-secondary" onclick="exportMembers()">
                    <i class="fas fa-download"></i>
                    تصدير
                </button>
            </div>
        </div>

        <!-- قسم البحث والتصفية -->
        <div class="search-section">
            <div class="search-filters">
                <div class="filter-group">
                    <label>بحث بالاسم</label>
                    <input type="text" id="searchName" placeholder="اسم العضو..." onkeyup="filterMembers()">
                </div>
                <div class="filter-group">
                    <label>الدور</label>
                    <select id="filterRole" onchange="filterMembers()">
                        <option value="">الكل</option>
                        <option value="president">نقيب عام</option>
                        <option value="vice_president">نائب أول</option>
                        <option value="committee_manager">مدير لجنة</option>
                        <option value="branch_manager">مدير فرع</option>
                        <option value="committee_member">عضو لجنة</option>
                        <option value="branch_member">عضو فرع</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>الحالة</label>
                    <select id="filterStatus" onchange="filterMembers()">
                        <option value="">الكل</option>
                        <option value="online">متصل</option>
                        <option value="offline">غير متصل</option>
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>المحافظة</label>
                    <select id="filterGovernorate" onchange="filterMembers()">
                        <option value="">الكل</option>
                        <option value="القاهرة">القاهرة</option>
                        <option value="الجيزة">الجيزة</option>
                        <option value="الإسكندرية">الإسكندرية</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn-secondary" onclick="resetFilters()">
                    <i class="fas fa-undo"></i>
                    إعادة تعيين
                </button>
            </div>
        </div>

        <!-- شبكة الأعضاء -->
        <div class="members-grid" id="membersGrid">
            <div class="loading-spinner" style="display: flex; position: relative; background: transparent;">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- ترقيم الصفحات -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- نافذة إضافة/تعديل عضو -->
    <div class="modal" id="memberModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="memberModalTitle"><i class="fas fa-user-plus"></i> إضافة عضو جديد</h3>
                <button class="close-modal" onclick="closeMemberModal()">&times;</button>
            </div>
            <form id="memberForm">
                <input type="hidden" id="memberId">
                
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="fullName" required>
                </div>
                
                <div class="form-group">
                    <label>الرقم القومي</label>
                    <input type="text" id="nationalId" required maxlength="14">
                </div>
                
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" required>
                </div>
                
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label>رقم قرار التكليف</label>
                    <input type="text" id="appointmentNumber" placeholder="مثال: 123/2024">
                </div>
                
                <div class="form-group">
                    <label>صورة قرار التكليف</label>
                    <div class="file-upload">
                        <input type="file" id="appointmentDoc" accept=".pdf,.jpg,.jpeg,.png">
                        <div class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            رفع ملف القرار
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>الدور</label>
                    <select id="role" required onchange="toggleRoleFields()">
                        <option value="">اختر الدور</option>
                        <option value="president">نقيب عام</option>
                        <option value="vice_president">نائب أول</option>
                        <option value="committee_manager">مدير لجنة</option>
                        <option value="branch_manager">مدير فرع</option>
                        <option value="committee_member">عضو لجنة</option>
                        <option value="branch_member">عضو فرع</option>
                    </select>
                </div>
                
                <div class="form-group" id="committeeField" style="display: none;">
                    <label>اللجنة</label>
                    <select id="committee">
                        <option value="">اختر اللجنة</option>
                    </select>
                </div>
                
                <div class="form-group" id="branchField" style="display: none;">
                    <label>الفرع</label>
                    <select id="branch">
                        <option value="">اختر الفرع</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>المنصب في اللجنة/الفرع</label>
                    <select id="position">
                        <option value="member">عضو</option>
                        <option value="vice">وكيل</option>
                        <option value="secretary">أمين عام</option>
                        <option value="secretary_assistant">مساعد أمين عام</option>
                        <option value="treasurer">أمين صندوق</option>
                        <option value="treasurer_assistant">مساعد أمين صندوق</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>المحافظة</label>
                    <select id="governorate" required>
                        <option value="">اختر المحافظة</option>
                        <option value="القاهرة">القاهرة</option>
                        <option value="الجيزة">الجيزة</option>
                        <option value="الإسكندرية">الإسكندرية</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="status">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                        <option value="suspended">موقوف</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>الصلاحيات الإضافية</label>
                    <div class="permissions-group">
                        <label class="permission-item">
                            <input type="checkbox" value="can_create_reports"> إنشاء تقارير
                        </label>
                        <label class="permission-item">
                            <input type="checkbox" value="can_manage_members"> إدارة أعضاء
                        </label>
                        <label class="permission-item">
                            <input type="checkbox" value="can_send_messages"> إرسال مراسلات
                        </label>
                        <label class="permission-item">
                            <input type="checkbox" value="can_view_reports"> عرض التقارير
                        </label>
                        <label class="permission-item">
                            <input type="checkbox" value="can_evaluate"> تقييم الأداء
                        </label>
                        <label class="permission-item">
                            <input type="checkbox" value="can_vote"> تصويت
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i>
                    حفظ العضو
                </button>
            </form>
        </div>
    </div>

    <!-- نافذة عرض ملف العضو -->
    <div class="modal" id="memberFileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-folder-open"></i> ملف العضو</h3>
                <button class="close-modal" onclick="closeMemberFileModal()">&times;</button>
            </div>
            <div id="memberFileContent" class="member-file">
                <!-- يتم تعبئتها ديناميكياً -->
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="printMemberFile()">
                    <i class="fas fa-print"></i> طباعة الملف
                </button>
                <button class="btn-secondary" onclick="downloadMemberFile()">
                    <i class="fas fa-download"></i> تحميل PDF
                </button>
            </div>
        </div>
    </div>

    <!-- نافذة تفاصيل العضو -->
    <div class="modal" id="memberDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> تفاصيل العضو</h3>
                <button class="close-modal" onclick="closeMemberDetailsModal()">&times;</button>
            </div>
            <div id="memberDetailsContent"></div>
        </div>
    </div>

    <!-- أيقونة AI -->
    <div class="ai-toggle" onclick="toggleAIChat()">
        <i class="fas fa-robot"></i>
    </div>

    <!-- رسائل النظام -->
    <div id="messageBox" class="message-box"></div>

    <!-- شاشة التحميل -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import NotificationSystem from './assets/js/notifications.js';
        import ThemeManager from './assets/js/theme-manager.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCaPhRG_1c7Rsu5Ss_MUNqsE18Ky_nyEAA",
            authDomain: "itws-system.firebaseapp.com",
            databaseURL: "https://itws-system-default-rtdb.firebaseio.com",
            projectId: "itws-system",
            storageBucket: "itws-system.firebasestorage.app",
            messagingSenderId: "770452248691",
            appId: "1:770452248691:web:0e94e65e01298b398bb206"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);

        // التحقق من تسجيل الدخول
        const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // تهيئة الأنظمة
        const notificationSystem = new NotificationSystem(currentUser);
        const themeManager = new ThemeManager(currentUser);

        // متغيرات عامة
        let allUsers = [];
        let filteredUsers = [];
        let committees = {};
        let branches = {};
        let currentPage = 1;
        const pageSize = 12;

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleDateString('ar-EG', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        // عرض معلومات المستخدم
        function displayUserInfo() {
            const userInfo = document.getElementById('userInfo');
            let title = '';
            
            switch(currentUser.role) {
                case 'president':
                    title = 'النقيب العام';
                    break;
                case 'vice_president':
                    title = 'النائب الأول';
                    break;
                default:
                    title = currentUser.title || 'عضو';
            }

            userInfo.innerHTML = `
                <div class="user-avatar" onclick="window.location.href='profile.html'">
                    ${currentUser.profileImage ? 
                        `<img src="${currentUser.profileImage}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">` : 
                        '<i class="fas fa-user-circle"></i>'}
                </div>
                <h3>${currentUser.fullName || currentUser.username}</h3>
                <p>${title}</p>
                <div class="online-badge">
                    <i class="fas fa-circle"></i> متصل الآن
                </div>
            `;
        }
        displayUserInfo();

        // دوال مساعدة
        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message-box ${type}`;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
        }

        // تحميل البيانات
        async function loadData() {
            showLoading(true);
            try {
                const [usersSnap, committeesSnap, branchesSnap] = await Promise.all([
                    get(ref(database, 'users')),
                    get(ref(database, 'committees')),
                    get(ref(database, 'branches'))
                ]);

                if (usersSnap.exists()) {
                    allUsers = Object.entries(usersSnap.val()).map(([id, data]) => ({
                        id,
                        ...data
                    }));
                    filteredUsers = [...allUsers];
                    document.getElementById('membersCount').textContent = allUsers.length;
                }

                if (committeesSnap.exists()) {
                    committees = committeesSnap.val();
                }

                if (branchesSnap.exists()) {
                    branches = branchesSnap.val();
                }

                displayMembers();
                populateSelects();

            } catch (error) {
                console.error('Error loading data:', error);
                showMessage('حدث خطأ في تحميل البيانات', 'error');
            } finally {
                showLoading(false);
            }
        }

        // تعبئة الخيارات
        function populateSelects() {
            const committeeSelect = document.getElementById('committee');
            const branchSelect = document.getElementById('branch');
            
            if (committeeSelect) {
                committeeSelect.innerHTML = '<option value="">اختر اللجنة</option>';
                Object.entries(committees).forEach(([id, committee]) => {
                    committeeSelect.innerHTML += `<option value="${id}">${committee.name}</option>`;
                });
            }

            if (branchSelect) {
                branchSelect.innerHTML = '<option value="">اختر الفرع</option>';
                Object.entries(branches).forEach(([id, branch]) => {
                    branchSelect.innerHTML += `<option value="${id}">${branch.name} - ${branch.governorate}</option>`;
                });
            }
        }

        // عرض الأعضاء
        function displayMembers() {
            const grid = document.getElementById('membersGrid');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageUsers = filteredUsers.slice(start, end);

            if (pageUsers.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">لا يوجد أعضاء</p>';
            } else {
                grid.innerHTML = pageUsers.map(user => {
                    // تحديد مكان العضو (لجنة أو فرع)
                    let location = '';
                    if (user.committee && committees[user.committee]) {
                        location = `لجنة: ${committees[user.committee].name}`;
                    } else if (user.branch && branches[user.branch]) {
                        location = `فرع: ${branches[user.branch].name}`;
                    }

                    return `
                        <div class="member-card">
                            <div class="member-status ${user.online ? 'status-online' : 'status-offline'}"></div>
                            <div class="member-avatar">
                                ${user.profileImage ? 
                                    `<img src="${user.profileImage}" alt="${user.fullName}">` : 
                                    (user.fullName || user.username || 'عضو').charAt(0)
                                }
                            </div>
                            <div class="member-info">
                                <h3>${user.fullName || user.username}</h3>
                                <div class="role">${user.title || this.getRoleName(user.role)}</div>
                                <div class="title">${user.position || ''}</div>
                            </div>
                            <div class="member-details">
                                <div class="detail-item">
                                    <i class="fas fa-phone"></i>
                                    <span class="label">الهاتف:</span>
                                    <span class="value">${user.phone || 'غير محدد'}</span>
                                </div>
                                <div class="detail-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span class="label">المحافظة:</span>
                                    <span class="value">${user.governorate || 'غير محدد'}</span>
                                </div>
                                <div class="detail-item">
                                    <i class="fas fa-briefcase"></i>
                                    <span class="label">الموقع:</span>
                                    <span class="value">${location || 'غير محدد'}</span>
                                </div>
                                ${user.appointmentNumber ? `
                                    <div class="appointment-doc">
                                        <i class="fas fa-gavel"></i>
                                        <span>قرار: ${user.appointmentNumber}</span>
                                        ${user.appointmentDoc ? 
                                            `<a href="${user.appointmentDoc}" target="_blank">
                                                <i class="fas fa-download"></i>
                                            </a>` : ''
                                        }
                                    </div>
                                ` : ''}
                            </div>
                            <div class="member-actions">
                                <button class="btn-view" onclick="viewMember('${user.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn-message" onclick="sendMessage('${user.id}')">
                                    <i class="fas fa-envelope"></i>
                                </button>
                                ${(currentUser.role === 'president' || currentUser.role === 'vice_president') ? `
                                    <button class="btn-edit" onclick="editMember('${user.id}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                ` : ''}
                                ${currentUser.role === 'president' ? `
                                    <button class="btn-evaluate" onclick="evaluateMember('${user.id}')">
                                        <i class="fas fa-star"></i>
                                    </button>
                                    <button class="btn-delete" onclick="deleteMember('${user.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            displayPagination();
        }

        // الحصول على اسم الدور
        function getRoleName(role) {
            const roles = {
                president: 'نقيب عام',
                vice_president: 'نائب أول',
                committee_manager: 'مدير لجنة',
                branch_manager: 'مدير فرع',
                committee_member: 'عضو لجنة',
                branch_member: 'عضو فرع'
            };
            return roles[role] || role;
        }

        // عرض أزرار التنقل بين الصفحات
        function displayPagination() {
            const totalPages = Math.ceil(filteredUsers.length / pageSize);
            const pagination = document.getElementById('pagination');
            
            let buttons = '';
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            pagination.innerHTML = `
                <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>السابق</button>
                ${buttons}
                <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>التالي</button>
            `;
        }

        // التنقل بين الصفحات
        window.changePage = function(direction) {
            const totalPages = Math.ceil(filteredUsers.length / pageSize);
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                displayMembers();
            }
        };

        window.goToPage = function(page) {
            currentPage = page;
            displayMembers();
        };

        // تصفية الأعضاء
        window.filterMembers = function() {
            const nameFilter = document.getElementById('searchName').value.toLowerCase();
            const roleFilter = document.getElementById('filterRole').value;
            const statusFilter = document.getElementById('filterStatus').value;
            const govFilter = document.getElementById('filterGovernorate').value;

            filteredUsers = allUsers.filter(user => {
                const matchName = !nameFilter || 
                    (user.fullName && user.fullName.toLowerCase().includes(nameFilter)) || 
                    (user.username && user.username.toLowerCase().includes(nameFilter));
                
                const matchRole = !roleFilter || user.role === roleFilter;
                const matchGov = !govFilter || user.governorate === govFilter;
                
                let matchStatus = true;
                if (statusFilter === 'online') matchStatus = user.online === true;
                else if (statusFilter === 'offline') matchStatus = user.online === false;
                else if (statusFilter === 'active') matchStatus = user.status === 'active';
                else if (statusFilter === 'inactive') matchStatus = user.status === 'inactive' || !user.status;
                
                return matchName && matchRole && matchGov && matchStatus;
            });

            currentPage = 1;
            displayMembers();
        };

        window.resetFilters = function() {
            document.getElementById('searchName').value = '';
            document.getElementById('filterRole').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterGovernorate').value = '';
            filteredUsers = [...allUsers];
            currentPage = 1;
            displayMembers();
        };

        // إضافة/تعديل عضو
        window.showAddMemberModal = function() {
            if (currentUser.role !== 'president' && currentUser.role !== 'vice_president') {
                showMessage('ليس لديك صلاحية إضافة أعضاء', 'error');
                return;
            }
            document.getElementById('memberModalTitle').innerHTML = '<i class="fas fa-user-plus"></i> إضافة عضو جديد';
            document.getElementById('memberForm').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('memberModal').classList.add('active');
        };

        window.closeMemberModal = function() {
            document.getElementById('memberModal').classList.remove('active');
        };

        window.toggleRoleFields = function() {
            const role = document.getElementById('role').value;
            document.getElementById('committeeField').style.display = role.includes('committee') ? 'block' : 'none';
            document.getElementById('branchField').style.display = role.includes('branch') ? 'block' : 'none';
        };

        document.getElementById('memberForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (currentUser.role !== 'president' && currentUser.role !== 'vice_president') {
                showMessage('ليس لديك صلاحية إضافة/تعديل أعضاء', 'error');
                return;
            }

            showLoading(true);

            try {
                const memberId = document.getElementById('memberId').value;
                
                // رفع ملف قرار التعيين إن وجد
                let appointmentDocUrl = null;
                const appointmentDoc = document.getElementById('appointmentDoc').files[0];
                if (appointmentDoc) {
                    const docRef = storageRef(storage, `appointments/${Date.now()}_${appointmentDoc.name}`);
                    await uploadBytes(docRef, appointmentDoc);
                    appointmentDocUrl = await getDownloadURL(docRef);
                }

                const memberData = {
                    fullName: document.getElementById('fullName').value,
                    nationalId: document.getElementById('nationalId').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    appointmentNumber: document.getElementById('appointmentNumber').value,
                    appointmentDoc: appointmentDocUrl,
                    role: document.getElementById('role').value,
                    committee: document.getElementById('committee').value || null,
                    branch: document.getElementById('branch').value || null,
                    position: document.getElementById('position').value,
                    governorate: document.getElementById('governorate').value,
                    status: document.getElementById('status').value,
                    permissions: Array.from(document.querySelectorAll('#memberForm input[type="checkbox"]:checked')).map(cb => cb.value),
                    updatedAt: new Date().toISOString(),
                    updatedBy: currentUser.userId
                };

                if (memberId) {
                    // تعديل عضو
                    await update(ref(database, `users/${memberId}`), memberData);
                    showMessage('تم تعديل العضو بنجاح', 'success');
                } else {
                    // إضافة عضو جديد
                    memberData.password = memberData.nationalId;
                    memberData.createdAt = new Date().toISOString();
                    memberData.createdBy = currentUser.userId;
                    memberData.trackingNumber = await generateTrackingNumber('MBR');
                    
                    const newUserRef = push(ref(database, 'users'));
                    await set(newUserRef, memberData);
                    
                    // إشعار العضو الجديد
                    await notificationSystem.createNotification({
                        userId: newUserRef.key,
                        type: 'welcome',
                        title: 'مرحباً بك في النقابة',
                        message: 'تم إنشاء حسابك بنجاح. يمكنك الآن تسجيل الدخول باستخدام الرقم القومي',
                        link: 'index.html'
                    });
                    
                    showMessage('تم إضافة العضو بنجاح', 'success');
                }

                closeMemberModal();
                loadData();

            } catch (error) {
                console.error('Error saving member:', error);
                showMessage('حدث خطأ في حفظ العضو', 'error');
            } finally {
                showLoading(false);
            }
        });

        // عرض تفاصيل العضو
        window.viewMember = async function(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            const content = document.getElementById('memberDetailsContent');
            
            // تحديد مكان العضو
            let location = '';
            if (user.committee && committees[user.committee]) {
                location = `لجنة: ${committees[user.committee].name}`;
            } else if (user.branch && branches[user.branch]) {
                location = `فرع: ${branches[user.branch].name}`;
            }

            content.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="member-avatar" style="margin: 0 auto;">
                        ${user.profileImage ? 
                            `<img src="${user.profileImage}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">` : 
                            (user.fullName || user.username).charAt(0)
                        }
                    </div>
                    <h3 style="color: var(--text-primary); margin-top: 10px;">${user.fullName || user.username}</h3>
                    <p style="color: var(--primary-color);">${user.title || this.getRoleName(user.role)}</p>
                </div>
                
                <div class="member-details">
                    <div class="detail-item">
                        <i class="fas fa-id-card"></i>
                        <span class="label">الرقم القومي:</span>
                        <span class="value">${user.nationalId || 'غير محدد'}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <span class="label">الهاتف:</span>
                        <span class="value">${user.phone || 'غير محدد'}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <span class="label">البريد:</span>
                        <span class="value">${user.email || 'غير محدد'}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span class="label">المحافظة:</span>
                        <span class="value">${user.governorate || 'غير محدد'}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-briefcase"></i>
                        <span class="label">الموقع:</span>
                        <span class="value">${location || 'غير محدد'}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-tag"></i>
                        <span class="label">المنصب:</span>
                        <span class="value">${user.position || 'عضو'}</span>
                    </div>
                    ${user.appointmentNumber ? `
                        <div class="detail-item">
                            <i class="fas fa-gavel"></i>
                            <span class="label">رقم القرار:</span>
                            <span class="value">${user.appointmentNumber}</span>
                        </div>
                    ` : ''}
                    ${user.appointmentDoc ? `
                        <div class="appointment-doc">
                            <i class="fas fa-file-pdf"></i>
                            <a href="${user.appointmentDoc}" target="_blank">تحميل قرار التكليف</a>
                        </div>
                    ` : ''}
                </div>
                
                <div style="margin-top: 20px;">
                    <h4 style="color: var(--text-primary); margin-bottom: 10px;">الصلاحيات</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                        ${user.permissions ? user.permissions.map(p => `
                            <span style="background: var(--bg-primary); padding: 5px 10px; border-radius: 5px; font-size: 12px;">
                                ${p}
                            </span>
                        `).join('') : 'لا توجد صلاحيات إضافية'}
                    </div>
                </div>
            `;

            document.getElementById('memberDetailsModal').classList.add('active');
        };

        window.closeMemberDetailsModal = function() {
            document.getElementById('memberDetailsModal').classList.remove('active');
        };

        // عرض ملف العضو الكامل
        window.showMemberFile = function(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            const content = document.getElementById('memberFileContent');
            
            // تجميع كل بيانات العضو
            const memberFile = {
                personal: {
                    'الاسم الكامل': user.fullName || 'غير محدد',
                    'الرقم القومي': user.nationalId || 'غير محدد',
                    'تاريخ الميلاد': user.birthDate || 'غير محدد',
                    'محل الميلاد': user.birthPlace || 'غير محدد',
                    'الجنسية': user.nationality || 'مصري',
                    'الدين': user.religion || 'غير محدد'
                },
                contact: {
                    'رقم الهاتف': user.phone || 'غير محدد',
                    'البريد الإلكتروني': user.email || 'غير محدد',
                    'العنوان': user.address || 'غير محدد',
                    'المحافظة': user.governorate || 'غير محدد'
                },
                work: {
                    'الدور': this.getRoleName(user.role),
                    'المنصب': user.position || 'عضو',
                    'الجهة': user.committee ? committees[user.committee]?.name : (user.branch ? branches[user.branch]?.name : 'غير محدد'),
                    'رقم القرار': user.appointmentNumber || 'غير محدد',
                    'تاريخ التعيين': user.createdAt ? new Date(user.createdAt).toLocaleDateString('ar-EG') : 'غير محدد',
                    'الحالة': user.status === 'active' ? 'نشط' : 'غير نشط'
                },
                system: {
                    'آخر دخول': user.lastLogin ? new Date(user.lastLogin).toLocaleString('ar-EG') : 'لم يسجل',
                    'آخر نشاط': user.lastSeen ? new Date(user.lastSeen).toLocaleString('ar-EG') : 'غير معروف',
                    'الحالة الآن': user.online ? 'متصل' : 'غير متصل',
                    'رقم العضوية': user.trackingNumber || 'غير محدد',
                    'تاريخ التسجيل': user.createdAt ? new Date(user.createdAt).toLocaleDateString('ar-EG') : 'غير محدد'
                },
                documents: {
                    'صورة شخصية': user.profileImage || 'غير متوفرة',
                    'قرار التكليف': user.appointmentDoc || 'غير متوفر'
                },
                permissions: user.permissions || []
            };

            content.innerHTML = `
                <div class="file-section">
                    <h4><i class="fas fa-user"></i> البيانات الشخصية</h4>
                    ${Object.entries(memberFile.personal).map(([key, value]) => `
                        <div class="file-row">
                            <span class="file-label">${key}:</span>
                            <span class="file-value">${value}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="file-section">
                    <h4><i class="fas fa-address-book"></i> بيانات الاتصال</h4>
                    ${Object.entries(memberFile.contact).map(([key, value]) => `
                        <div class="file-row">
                            <span class="file-label">${key}:</span>
                            <span class="file-value">${value}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="file-section">
                    <h4><i class="fas fa-briefcase"></i> بيانات العمل</h4>
                    ${Object.entries(memberFile.work).map(([key, value]) => `
                        <div class="file-row">
                            <span class="file-label">${key}:</span>
                            <span class="file-value">${value}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="file-section">
                    <h4><i class="fas fa-history"></i> بيانات النظام</h4>
                    ${Object.entries(memberFile.system).map(([key, value]) => `
                        <div class="file-row">
                            <span class="file-label">${key}:</span>
                            <span class="file-value">${value}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="file-section">
                    <h4><i class="fas fa-file"></i> المستندات</h4>
                    ${memberFile.documents['صورة شخصية'] !== 'غير متوفرة' ? `
                        <div class="file-row">
                            <span class="file-label">الصورة الشخصية:</span>
                            <a href="${memberFile.documents['صورة شخصية']}" target="_blank" class="document-link">
                                <i class="fas fa-image"></i> عرض الصورة
                            </a>
                        </div>
                    ` : ''}
                    ${memberFile.documents['قرار التكليف'] !== 'غير متوفر' ? `
                        <div class="file-row">
                            <span class="file-label">قرار التكليف:</span>
                            <a href="${memberFile.documents['قرار التكليف']}" target="_blank" class="document-link">
                                <i class="fas fa-file-pdf"></i> تحميل القرار
                            </a>
                        </div>
                    ` : ''}
                </div>

                <div class="file-section">
                    <h4><i class="fas fa-key"></i> الصلاحيات</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                        ${memberFile.permissions.length ? 
                            memberFile.permissions.map(p => `
                                <span style="background: var(--bg-primary); padding: 5px 10px; border-radius: 5px;">
                                    ${p}
                                </span>
                            `).join('') : 
                            'لا توجد صلاحيات إضافية'
                        }
                    </div>
                </div>
            `;

            document.getElementById('memberFileModal').classList.add('active');
        };

        window.closeMemberFileModal = function() {
            document.getElementById('memberFileModal').classList.remove('active');
        };

        // طباعة ملف العضو
        window.printMemberFile = function() {
            const content = document.getElementById('memberFileContent').innerHTML;
            const printWindow = window.open('', '_blank');
            
            printWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>ملف العضو</title>
                    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Cairo', sans-serif; padding: 20px; }
                        h1 { color: #667eea; text-align: center; }
                        h2 { color: #333; margin-top: 20px; }
                        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
                        td { padding: 8px; border: 1px solid #ddd; }
                        .label { font-weight: bold; width: 30%; }
                    </style>
                </head>
                <body>
                    <h1>نقابة تكنولوجيا المعلومات والبرمجيات</h1>
                    <h2>ملف العضو</h2>
                    ${content.replace(/<button[\s\S]*?<\/button>/g, '')}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        };

        // تحميل ملف العضو
        window.downloadMemberFile = function() {
            const content = document.getElementById('memberFileContent').innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `member-file-${Date.now()}.txt`;
            a.click();
        };

        // تعديل عضو
        window.editMember = function(userId) {
            if (currentUser.role !== 'president' && currentUser.role !== 'vice_president') {
                showMessage('ليس لديك صلاحية تعديل أعضاء', 'error');
                return;
            }

            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            document.getElementById('memberModalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل عضو';
            document.getElementById('memberId').value = userId;
            document.getElementById('fullName').value = user.fullName || '';
            document.getElementById('nationalId').value = user.nationalId || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('appointmentNumber').value = user.appointmentNumber || '';
            document.getElementById('role').value = user.role || '';
            document.getElementById('committee').value = user.committee || '';
            document.getElementById('branch').value = user.branch || '';
            document.getElementById('position').value = user.position || 'member';
            document.getElementById('governorate').value = user.governorate || '';
            document.getElementById('status').value = user.status || 'active';

            toggleRoleFields();

            if (user.permissions) {
                document.querySelectorAll('#memberForm input[type="checkbox"]').forEach(cb => {
                    cb.checked = user.permissions.includes(cb.value);
                });
            }

            document.getElementById('memberModal').classList.add('active');
        };

        // إرسال رسالة لعضو
        window.sendMessage = function(userId) {
            sessionStorage.setItem('messageRecipient', userId);
            window.location.href = 'messages.html';
        };

        // تقييم عضو
        window.evaluateMember = function(userId) {
            sessionStorage.setItem('evaluateMember', userId);
            window.location.href = 'evaluations.html';
        };

        // حذف عضو
        window.deleteMember = async function(userId) {
            if (currentUser.role !== 'president') {
                showMessage('ليس لديك صلاحية حذف أعضاء', 'error');
                return;
            }

            if (!confirm('هل أنت متأكد من حذف هذا العضو؟')) return;

            showLoading(true);
            try {
                await remove(ref(database, `users/${userId}`));
                showMessage('تم حذف العضو بنجاح', 'success');
                loadData();
            } catch (error) {
                console.error('Error deleting member:', error);
                showMessage('حدث خطأ في حذف العضو', 'error');
            } finally {
                showLoading(false);
            }
        };

        // تصدير الأعضاء
        window.exportMembers = function() {
            const data = filteredUsers.map(u => ({
                الاسم: u.fullName || u.username,
                الدور: this.getRoleName(u.role),
                الهاتف: u.phone,
                البريد: u.email,
                المحافظة: u.governorate,
                الحالة: u.online ? 'متصل' : 'غير متصل',
                'آخر ظهور': u.lastSeen ? new Date(u.lastSeen).toLocaleString('ar-EG') : ''
            }));

            const csv = convertToCSV(data);
            downloadCSV(csv, `members-${new Date().toISOString().split('T')[0]}.csv`);
        };

        function convertToCSV(data) {
            const headers = Object.keys(data[0] || {});
            const rows = data.map(obj => headers.map(header => JSON.stringify(obj[header] || '')).join(','));
            return [headers.join(','), ...rows].join('\n');
        }

        function downloadCSV(csv, filename) {
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        // توليد رقم تتبع
        async function generateTrackingNumber(prefix) {
            const year = new Date().getFullYear();
            const counterRef = ref(database, `counters/${prefix}_${year}`);
            const snapshot = await get(counterRef);
            const currentCount = snapshot.exists() ? snapshot.val() : 0;
            const newCount = currentCount + 1;
            await set(counterRef, newCount);
            
            const paddedNumber = newCount.toString().padStart(4, '0');
            return `${prefix}-${paddedNumber}-${year}`;
        }

        // دوال AI
        window.toggleAIChat = function() {
            showMessage('🤖 ITWS AI: كيف يمكنني مساعدتك في إدارة الأعضاء؟', 'info');
        };

        // تسجيل الخروج
        window.logout = async function() {
            await update(ref(database, `users/${currentUser.userId}`), {
                online: false,
                lastSeen: new Date().toISOString()
            });
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };

        // تحديث حالة المتصل
        async function updateOnlineStatus(status) {
            await update(ref(database, `users/${currentUser.userId}`), {
                online: status,
                lastSeen: new Date().toISOString()
            });
        }

        window.addEventListener('load', () => {
            updateOnlineStatus(true);
            loadData();
        });

        window.addEventListener('beforeunload', () => {
            updateOnlineStatus(false);
        });

        // تحديث مباشر
        onValue(ref(database, 'users'), () => loadData());

    </script>
</body>
</html>
