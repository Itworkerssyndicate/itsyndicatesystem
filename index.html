<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقابة تكنولوجيا المعلومات والبرمجيات - تسجيل الدخول</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== شاشة البداية ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeOut 0.5s ease 3.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .splash-content {
            text-align: center;
            color: white;
            animation: zoomIn 1s ease;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 70px;
            color: #667eea;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
            overflow: hidden;
        }

        .splash-logo i {
            font-size: 70px;
            color: #667eea;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .splash-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .splash-subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 4px;
            animation: load 3s linear forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }

        .splash-footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* ===== شاشة تسجيل الدخول ===== */
        .login-wrapper {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .animated-bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: move 25s linear infinite;
            bottom: -150px;
        }

        .animated-bg span:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }

        .animated-bg span:nth-child(2) {
            left: 10%;
            width: 40px;
            height: 40px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .animated-bg span:nth-child(3) {
            left: 70%;
            width: 30px;
            height: 30px;
            animation-delay: 4s;
        }

        .animated-bg span:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 22s;
        }

        .animated-bg span:nth-child(5) {
            left: 65%;
            width: 50px;
            height: 50px;
            animation-delay: 0s;
        }

        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            animation: slideUp 1s ease 3.5s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-small {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .logo-small i {
            font-size: 40px;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .logo-small:hover {
            transform: scale(1.1) rotate(360deg);
        }

        .logo-small:hover i {
            color: #764ba2;
        }

        h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        label i {
            margin-left: 8px;
            color: #667eea;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        input:focus + i {
            transform: translateY(-50%) scale(1.2);
            color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover:before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-right: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* ===== نظام الأمان المتقدم ===== */
        .security-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999999;
            box-shadow: 0 4px 12px rgba(220,53,69,0.3);
            animation: slideDown 0.3s ease;
            direction: rtl;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        .security-watermark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.15;
            font-size: 12px;
            color: #000;
            pointer-events: none;
            z-index: 9999;
            transform: rotate(-45deg);
            white-space: nowrap;
            user-select: none;
            font-family: monospace;
        }

        /* ===== رسائل النظام ===== */
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message-box.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .message-box.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-box.info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-spinner p {
            color: white;
            font-size: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== أنيميشن إضافي ===== */
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- شاشة البداية (بأيقونة بدل الصورة) -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo animate-float">
                <i class="fas fa-users-cog"></i>
            </div>
            <h1 class="splash-title">نقابة تكنولوجيا المعلومات</h1>
            <div class="splash-subtitle">والبرمجيات - منصة إدارة النقابة</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
        <div class="splash-footer">
            جميع الحقوق محفوظة © 2024
        </div>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="login-wrapper" id="loginWrapper" style="display: none;">
        <div class="animated-bg">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="login-container">
            <div id="messageBox" class="message-box"></div>
            
            <div id="loadingSpinner" class="loading-spinner">
                <div class="spinner"></div>
                <p>جاري التحميل...</p>
            </div>

            <!-- بطاقة تسجيل الدخول -->
            <div class="card" id="loginCard">
                <div class="header">
                    <div class="logo-small" id="loginLogo">
                        <i class="fas fa-users-cog" id="loginLogoIcon"></i>
                    </div>
                    <h1 id="unionName">نقابة تكنولوجيا المعلومات والبرمجيات</h1>
                    <p class="subtitle">منصة إدارة النقابة</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> اسم المستخدم</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" required autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                        </div>
                    </div>

                    <button type="submit" class="btn">
                        <i class="fas fa-sign-in-alt"></i>
                        تسجيل الدخول
                    </button>
                </form>

                <div class="toggle-link">
                    <span>ليس لديك حساب؟</span>
                    <a href="register.html">تسجيل جديد</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ===== استيراد Firebase =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaPhRG_1c7Rsu5Ss_MUNqsE18Ky_nyEAA",
            authDomain: "itws-system.firebaseapp.com",
            databaseURL: "https://itws-system-default-rtdb.firebaseio.com",
            projectId: "itws-system",
            storageBucket: "itws-system.firebasestorage.app",
            messagingSenderId: "770452248691",
            appId: "1:770452248691:web:0e94e65e01298b398bb206"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // ===== نظام الأمان المتقدم =====
        (function() {
            // منع الكليك اليمين
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showSecurityAlert('🚫 القائمة محجوزة للنظام');
                return false;
            });

            // منع F12 وأدوات المطورين
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                    (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    showSecurityAlert('🚫 هذه الميزة غير متاحة');
                    return false;
                }
            });

            // منع النسخ واللصق
            document.addEventListener('copy', function(e) {
                e.preventDefault();
                showSecurityAlert('📋 النسخ غير مسموح');
            });

            document.addEventListener('paste', function(e) {
                e.preventDefault();
                showSecurityAlert('📋 اللصق غير مسموح');
            });

            document.addEventListener('cut', function(e) {
                e.preventDefault();
            });

            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            // كشف أدوات المطورين
            setInterval(function() {
                const widthThreshold = window.outerWidth - window.innerWidth > 160;
                const heightThreshold = window.outerHeight - window.innerHeight > 160;
                
                if (widthThreshold || heightThreshold) {
                    document.body.innerHTML = `
                        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f8d7da; color:#721c24; font-family:'Cairo'; padding:20px;">
                            <i class="fas fa-shield-alt" style="font-size:80px; margin-bottom:20px;"></i>
                            <h1 style="font-size:32px;">🚫 تم إغلاق النظام</h1>
                            <p style="font-size:18px;">لأسباب أمنية، تم إنهاء الجلسة</p>
                            <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:#721c24; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;">إعادة تحميل الصفحة</button>
                        </div>
                    `;
                }
            }, 1000);

            // إضافة علامة مائية
            function addWatermark() {
                const watermark = document.createElement('div');
                watermark.className = 'security-watermark';
                watermark.textContent = 'زائر - ' + new Date().toLocaleDateString('ar-EG');
                document.body.appendChild(watermark);
            }
            addWatermark();

            // تحديث العلامة المائية كل دقيقة
            setInterval(function() {
                const watermark = document.querySelector('.security-watermark');
                if (watermark) {
                    watermark.textContent = 'زائر - ' + new Date().toLocaleDateString('ar-EG') + ' - ' + new Date().toLocaleTimeString('ar-EG');
                }
            }, 60000);

            // دالة عرض رسالة أمان
            window.showSecurityAlert = function(message) {
                const alert = document.createElement('div');
                alert.className = 'security-alert';
                alert.textContent = message;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 3000);
            };
        })();

        // ===== تحميل إعدادات النظام =====
        async function loadSystemSettings() {
            try {
                const settingsRef = ref(database, 'system/settings');
                const snapshot = await get(settingsRef);
                
                if (snapshot.exists()) {
                    const settings = snapshot.val();
                    
                    // تحديث اسم النقابة
                    if (settings.general?.nameAr) {
                        document.getElementById('unionName').textContent = settings.general.nameAr;
                    }
                    
                    // تحديث شعار النقابة (أيقونة فقط - بدون صور)
                    // ملاحظة: اللوجو هيبقى أيقونة فقط، الصور مستبعدة تماماً من النظام
                    console.log('System settings loaded:', settings);
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // ===== بعد تحميل الصفحة =====
        setTimeout(function() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('loginWrapper').style.display = 'flex';
            
            // تحميل إعدادات النظام
            loadSystemSettings();
        }, 3500);

        // ===== تسجيل الدخول =====
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                showMessage('يرجى إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            showLoading(true);

            try {
                // البحث عن المستخدم
                const usersRef = ref(database, 'users');
                const snapshot = await get(usersRef);
                
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    let foundUser = null;
                    let userId = null;

                    for (const [id, user] of Object.entries(users)) {
                        if (user.fullName === username || user.username === username) {
                            if (user.password === password || user.nationalId === password) {
                                foundUser = user;
                                userId = id;
                                break;
                            }
                        }
                    }

                    if (foundUser) {
                        // التحقق من حالة المستخدم
                        if (foundUser.status !== 'active') {
                            showMessage('هذا الحساب غير نشط. يرجى التواصل مع الإدارة', 'error');
                            showLoading(false);
                            return;
                        }

                        // تحديث آخر دخول
                        await update(ref(database, `users/${userId}`), {
                            lastLogin: new Date().toISOString(),
                            online: true,
                            loginCount: (foundUser.loginCount || 0) + 1
                        });

                        // حفظ في الجلسة
                        sessionStorage.setItem('currentUser', JSON.stringify({
                            userId: userId,
                            ...foundUser
                        }));

                        showMessage('تم تسجيل الدخول بنجاح', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        // التحقق من وجود طلب معلق
                        const pendingRef = ref(database, 'pending_requests');
                        const pendingSnapshot = await get(pendingRef);
                        
                        let isPending = false;
                        if (pendingSnapshot.exists()) {
                            const requests = pendingSnapshot.val();
                            for (const req of Object.values(requests)) {
                                if (req.fullName === username && req.status === 'pending') {
                                    isPending = true;
                                    break;
                                }
                            }
                        }

                        if (isPending) {
                            showMessage('طلبك قيد المراجعة، سيتم إشعارك عند الموافقة', 'info');
                        } else {
                            showMessage('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                        }
                        showLoading(false);
                    }
                } else {
                    showMessage('لا توجد بيانات مستخدمين', 'error');
                    showLoading(false);
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('حدث خطأ في تسجيل الدخول', 'error');
                showLoading(false);
            }
        });

        // ===== دوال مساعدة =====
        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message-box ${type}`;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
        }

        // ===== التحقق من وجود مستخدم مسجل بالفعل =====
        (function checkLoggedIn() {
            const user = sessionStorage.getItem('currentUser');
            if (user) {
                window.location.href = 'dashboard.html';
            }
        })();
    </script>
</body>
</html>
